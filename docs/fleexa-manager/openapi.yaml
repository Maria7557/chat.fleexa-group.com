openapi: 3.1.0
info:
  title: Fleexa Manager Mobile API
  version: 0.1.0
  summary: API-first contract for Expo web and iPhone manager surfaces.
  description: |
    This contract defines the Fleexa Manager facade API. It intentionally does
    not expose raw Chatwoot objects, database rows, Vue view models, or upstream
    route shapes. The server maps Chatwoot conversations, CRM deals, and booking
    records into stable mobile-ready DTOs.

    All account resources are isolated by `accountId`. The authenticated user
    must have an active membership in the requested account and the endpoint
    permission listed by `x-permission`.

    Stage 3 keeps temporary Chatwoot authentication through the Manager
    namespace while replacing token-paste UX with `POST /session` email/password
    exchange. Existing Chatwoot user access tokens and same-origin Rails sessions
    are still accepted for compatibility, but raw Chatwoot API payloads and
    routes are not the Manager contract. Dedicated Manager refresh and revoke
    endpoints must replace this before production beta.
servers:
  - url: https://api.fleexa.example.com/api/fleexa-manager/v1
    description: Production API base path placeholder.
  - url: http://localhost:3000/api/fleexa-manager/v1
    description: Local development API base path placeholder.
security:
  - chatwootBearerAuth: []
  - chatwootApiAccessToken: []
  - chatwootSessionCookie: []
tags:
  - name: Session
  - name: Conversations
  - name: Messages
  - name: Deals
  - name: Pipeline
  - name: Bookings
  - name: Counters

paths:
  /session:
    post:
      tags:
        - Session
      operationId: createSession
      summary: Exchange manager email/password credentials for a temporary Manager session.
      description: |
        Stage 3 uses this endpoint as a narrow adapter over the existing
        Chatwoot user authentication model. The manager submits email and
        password, the backend verifies active Chatwoot credentials and account
        membership, and the response returns a Manager session DTO plus a
        temporary bearer token for the Expo client to store internally.

        This endpoint is not the final production-beta auth system: it does not
        implement refresh-token rotation, server-side session inventory, or
        token revoke. Expo UI must never display the returned token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginSessionRequest"
      responses:
        "201":
          description: Session created from valid Chatwoot credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSessionResponse"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/RateLimited"

  /session/current:
    get:
      tags:
        - Session
      operationId: getCurrentSession
      summary: Get the current user, account memberships, permissions, and realtime bootstrap.
      x-permission: session:read
      parameters:
        - $ref: "#/components/parameters/ActiveAccountIdQuery"
      responses:
        "200":
          description: Current authenticated session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /accounts/{accountId}/conversations:
    get:
      tags:
        - Conversations
      operationId: listConversations
      summary: List manager conversations with mobile-ready summaries.
      description: |
        Returns normalized conversation list items. The response must not leak
        raw Chatwoot conversation payloads, inbox rows, contact rows, or message
        internals.
      x-account-isolation: required
      x-permission: conversations:read
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ConversationStatus"
        - name: filter
          in: query
          description: |
            Manager conversation bucket. The backend owns unread and reply-state
            calculations; clients must not approximate these filters locally.
          schema:
            $ref: "#/components/schemas/ConversationFilter"
            default: all
        - name: assignment
          in: query
          description: Deprecated Stage 2 ownership filter kept for temporary compatibility; prefer `filter`.
          schema:
            type: string
            enum:
              - mine
              - unassigned
              - all
            default: all
        - name: channel
          in: query
          schema:
            type: string
            examples:
              - whatsapp
              - instagram
              - web_widget
        - name: updatedAfter
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated conversation summaries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"

  /accounts/{accountId}/conversations/{conversationId}:
    get:
      tags:
        - Conversations
      operationId: getConversationDetail
      summary: Get one manager conversation detail.
      x-account-isolation: required
      x-permission: conversations:read
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "200":
          description: Conversation detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /accounts/{accountId}/conversations/{conversationId}/messages:
    get:
      tags:
        - Messages
      operationId: listMessages
      summary: List normalized messages for a conversation.
      x-account-isolation: required
      x-permission: conversations:read
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/ConversationId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        "200":
          description: Paginated message DTOs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /accounts/{accountId}/conversations/{conversationId}/messages/text:
    post:
      tags:
        - Messages
      operationId: sendTextMessage
      summary: Send a text message to the conversation contact.
      description: |
        The client must provide `clientMessageId` in the body and may also send
        `Idempotency-Key`. Stage 2 SDKs send both as the same UUID value. The
        backend must use `Idempotency-Key` when present, otherwise
        `clientMessageId`, as the idempotency key. Repeating the same request
        must return the original accepted message DTO and must not create a
        second Chatwoot message. Reusing the same key with a different payload
        returns `409 conflict`.
      x-account-isolation: required
      x-permission: messages:send
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/ConversationId"
        - $ref: "#/components/parameters/OptionalIdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendTextMessageRequest"
      responses:
        "201":
          description: Message accepted for delivery.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageSendResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/RateLimited"

  /accounts/{accountId}/conversations/{conversationId}/deal:
    get:
      tags:
        - Deals
      operationId: getLinkedDeal
      summary: Get the CRM deal linked to a conversation.
      description: |
        Returns the account-scoped Manager deal DTO linked to the conversation,
        or `missing` when the conversation has no CRM deal yet. The response is
        not a raw Chatwoot or CRM model payload.
      x-account-isolation: required
      x-permission: deals:read
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "200":
          description: Linked deal state for the conversation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkedDealResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Deals
      operationId: createConversationDeal
      summary: Create or return the CRM deal linked to a conversation.
      description: |
        Creates a deal from the conversation when none exists. If the
        conversation already has a linked deal, the existing deal is returned
        without creating a duplicate. Stage, source, lead origin, and assignment
        are validated backend-side against account-owned data.
      x-account-isolation: required
      x-permission: deals:update
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/ConversationId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationDealRequest"
      responses:
        "200":
          description: Existing linked deal returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkedDealResponse"
        "201":
          description: Deal created and linked to the conversation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkedDealResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /accounts/{accountId}/deals/{dealId}:
    patch:
      tags:
        - Deals
      operationId: updateDeal
      summary: Update Manager-visible CRM deal fields.
      description: |
        Updates the minimal deal fields needed by Fleexa Manager. The backend
        owns validation for stage, qualification, source attribution, lead
        origin, lost reason, assignment, and tenant isolation.
      x-account-isolation: required
      x-permission: deals:update
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/DealId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDealRequest"
      responses:
        "200":
          description: Deal updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealMutationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /accounts/{accountId}/deals/{dealId}/stage:
    patch:
      tags:
        - Deals
      operationId: updateDealStage
      summary: Move a deal to another pipeline stage.
      description: |
        Stage movement rules are enforced by the backend. The client must not
        infer required fields, terminal-stage semantics, or blocked transitions
        from UI state alone.
      x-account-isolation: required
      x-permission: deals:update_stage
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/DealId"
        - $ref: "#/components/parameters/OptionalIdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealStageUpdateRequest"
      responses:
        "200":
          description: Deal moved or already in requested stage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealStageUpdateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /accounts/{accountId}/pipeline/stages:
    get:
      tags:
        - Pipeline
      operationId: listPipelineStages
      summary: List manager pipeline stages.
      x-account-isolation: required
      x-permission: pipeline:read
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - name: includeCounters
          in: query
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Ordered pipeline stages.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineStagesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /accounts/{accountId}/pipeline/stages/{stageId}/deals:
    get:
      tags:
        - Pipeline
      operationId: listDealsByStage
      summary: List deals in one stage through the Stage 2 compatibility alias.
      description: |
        Compatibility alias for older clients that already hold a stage id.
        New Stage 3 clients should prefer `/accounts/{accountId}/pipeline/deals`
        with `stageId` or `stageKey` query parameters.
      x-account-isolation: required
      x-permission: deals:read
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/StageId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: assignedTo
          in: query
          schema:
            type: string
            examples:
              - me
              - user_01J5N2C9X3H3STQW1MGJ8B6RWD
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - last_activity_desc
              - created_desc
              - amount_desc
              - amount_asc
            default: last_activity_desc
      responses:
        "200":
          description: Paginated deals in the requested stage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealsByStageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /accounts/{accountId}/pipeline/deals:
    get:
      tags:
        - Pipeline
      operationId: listPipelineDeals
      summary: List account-scoped Manager deal list DTOs.
      description: |
        Returns normalized deal list items for Manager pipeline surfaces.
        Pipeline stages remain backend-owned: clients must use stage ids,
        keys, labels, colors, order, and terminal semantics returned by the
        Manager API and must not hardcode stage names or colors.
      x-account-isolation: required
      x-permission: deals:read
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: stageId
          in: query
          schema:
            type: string
            pattern: "^stage_[A-Za-z0-9]+$"
        - name: stageKey
          in: query
          schema:
            type: string
        - name: assignedTo
          in: query
          schema:
            type: string
            examples:
              - me
              - user_01J5N2C9X3H3STQW1MGJ8B6RWD
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - last_activity_desc
              - created_desc
              - amount_desc
              - amount_asc
            default: last_activity_desc
      responses:
        "200":
          description: Paginated account deal list DTOs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealsListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /accounts/{accountId}/deals/{dealId}/booking:
    get:
      tags:
        - Bookings
      operationId: getBookingByDeal
      summary: Get the booking linked to a deal.
      x-account-isolation: required
      x-permission: bookings:read
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/DealId"
      responses:
        "200":
          description: Booking link state for the deal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingByDealResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /accounts/{accountId}/bookings/resolve-deal:
    post:
      tags:
        - Bookings
      operationId: resolveBookingDealReference
      summary: Resolve a manager-entered Pipeline deal reference for Booking sync.
      description: |
        Server-to-server Booking -> Chat endpoint in the Manager namespace.
        Chat stores only a digest of the inbound service token, scoped to this
        `accountId` and `fleexa_company_id`. The raw token is never stored in
        Chat and must never be sent to frontend clients.

        `pipeline_deal_ref_input` is raw manager input only. Values such as
        `#344`, `344`, `D-344`, deal URLs, conversation URLs, and conversation
        ids must be resolved to a real `crm_deals.id` before any link is
        persisted. A conversation id must resolve through its linked deal; it is
        not a deal id. If deal and conversation references are both exact and
        disagree, return `AMBIGUOUS_REFERENCE`.
      security:
        - bookingServiceToken: []
      x-account-isolation: required
      x-service-scope: booking:sync
      parameters:
        - $ref: "#/components/parameters/AccountId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingResolveDealRequest"
            examples:
              rawNumber:
                value:
                  pipeline_deal_ref_input: "#83839"
              dealUrl:
                value:
                  pipeline_deal_ref_input: "https://chat.example.com/app/accounts/1/pipeline/deals/deal_83839"
              conversationUrl:
                value:
                  pipeline_deal_ref_input: "https://chat.example.com/app/accounts/1/conversations/344"
      responses:
        "200":
          description: Reference resolved, ambiguous, not found, or disabled as a successful business response.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/BookingResolveDealResponse"
                  - $ref: "#/components/schemas/BookingSyncDisabledResponse"
              examples:
                resolved:
                  value:
                    status: RESOLVED
                    retryable: false
                    accountId: acc_1
                    fleexaCompanyId: fleexa_company_42
                    pipeline_deal_id: "83839"
                    deal_display_number: "D-83839"
                    conversation_id: "344"
                    company_id: fleexa_company_42
                    client_preview:
                      id: "91"
                      displayName: Sara Khan
                      phoneNumber: "+971501112233"
                    candidates: []
                ambiguous:
                  value:
                    status: AMBIGUOUS_REFERENCE
                    retryable: false
                    accountId: acc_1
                    fleexaCompanyId: fleexa_company_42
                    pipeline_deal_id: null
                    candidates:
                      - pipeline_deal_id: "11"
                        deal_display_number: "D-11"
                        title: Existing active deal
                        conversation_id: "344"
                        reason: deal_ref_and_conversation_ref_disagree
                        active: true
                disabled:
                  value:
                    status: SYNC_DISABLED
                    code: SYNC_DISABLED
                    retryable: false
                    accountId: acc_1
                    fleexaCompanyId: fleexa_company_42
                    message: Booking sync receiver is disabled for this account.
        "401":
          $ref: "#/components/responses/ServiceUnauthorized"
        "403":
          $ref: "#/components/responses/ServiceForbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /accounts/{accountId}/bookings/sync:
    post:
      tags:
        - Bookings
      operationId: syncBookingToPipeline
      summary: Sync a Booking event into real Chat Pipeline deals.
      description: |
        Server-to-server Booking -> Chat endpoint. It writes into real
        `crm_deals` only; it does not define a queue, Integration Hub, or a
        parallel CRM.

        Freshness is decided by monotonic `booking_version`, not by
        `source_updated_at`. `source_updated_at` is informational and must not
        be used as the ordering source. `PENDING_USER_ACTION`,
        `STALE_BOOKING_EVENT`, and `SYNC_DISABLED` are successful non-retryable
        business responses. Temporary 5xx responses are retryable. Auth/account
        mismatch returns non-retryable 401/403, and validation errors return
        non-retryable 422.

        Phone is a candidate signal only. The receiver must never auto-merge
        clients by phone. Existing deal `contact_id` and `client_phone` must not
        be overwritten without explicit manager confirmation.
      security:
        - bookingServiceToken: []
      x-account-isolation: required
      x-service-scope: booking:sync
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - $ref: "#/components/parameters/OptionalIdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingSyncRequest"
            examples:
              reservation:
                value:
                  booking_id: order_1001
                  booking_number: BK-1001
                  booking_client_id: booking_contact_501
                  booking_client_name: Mina Patel
                  booking_client_phone: null
                  booking_version: 7
                  source_updated_at: "2026-07-18T10:00:00Z"
                  event_id: "evt_booking_1001_v7"
                  pipeline_deal_id: null
                  vehicle:
                    vehicle_id: vehicle_77
                    vehicle_name: Range Rover Sport
                    vehicle_plate: D 83839
                    brand_model: Range Rover Sport
                    fleet_number: FLEET-77
                    photo_url: "https://booking.example.com/vehicles/77/photo.jpg"
                    group: SUV
                  rental_start: "2026-07-20T10:00:00Z"
                  rental_end: "2026-07-22T10:00:00Z"
                  rental_days: 2
                  amount: "1800.00"
                  currency: AED
                  booking_status: reserved
                  source:
                    type: Booking
                  referral:
                    communication_phone: "+971501112233"
                    referred_by_contact_id: null
      responses:
        "200":
          description: Sync accepted, completed, pending user action, stale no-op, or disabled no-op.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/BookingSyncResponse"
                  - $ref: "#/components/schemas/BookingStaleEventResponse"
                  - $ref: "#/components/schemas/BookingSyncDisabledResponse"
              examples:
                synced:
                  value:
                    status: SYNCED
                    retryable: false
                    accountId: acc_1
                    fleexaCompanyId: fleexa_company_42
                    bookingId: order_1001
                    bookingVersion: 7
                    freshnessBasis: booking_version
                    pipelineDealId: "83839"
                    mutated: true
                pendingUserAction:
                  value:
                    status: PENDING_USER_ACTION
                    retryable: false
                    accountId: acc_1
                    fleexaCompanyId: fleexa_company_42
                    bookingId: order_1001
                    candidates:
                      - pipeline_deal_id: "83839"
                        deal_display_number: "D-83839"
                        title: Active deal for same booking client candidate
                        conversation_id: "344"
                        reason: multiple_active_deals
                        active: true
                staleNoop:
                  value:
                    status: STALE_BOOKING_EVENT
                    retryable: false
                    accountId: acc_1
                    fleexaCompanyId: fleexa_company_42
                    bookingId: order_1001
                    acceptedBookingVersion: 8
                    receivedBookingVersion: 7
                    freshnessBasis: booking_version
                disabled:
                  value:
                    status: SYNC_DISABLED
                    code: SYNC_DISABLED
                    retryable: false
                    accountId: acc_1
                    fleexaCompanyId: fleexa_company_42
                    message: Booking sync receiver is disabled for this account.
        "401":
          $ref: "#/components/responses/ServiceUnauthorized"
        "403":
          $ref: "#/components/responses/ServiceForbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          description: Temporary server failure. Booking worker may retry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /accounts/{accountId}/bookings/{bookingId}/relink-deal:
    post:
      tags:
        - Bookings
      operationId: relinkBookingPipelineDeal
      summary: Change the deal linked to a Booking order.
      description: |
        Server-to-server relink endpoint. It is transaction-safe, clears the old
        deal's `booking_id`, links the new deal, and stores structured durable
        audit in existing deal activity/custom attributes. The target deal must
        belong to the same `accountId`; a deal from another account is a
        non-retryable 403.
      security:
        - bookingServiceToken: []
      x-account-isolation: required
      x-service-scope: booking:relink
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - name: bookingId
          in: path
          required: true
          description: Fleexa Booking Order.id, not display booking number.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingRelinkRequest"
            examples:
              managerFix:
                value:
                  new_pipeline_deal_id: "83840"
                  reason: Wrong deal was selected by manager.
      responses:
        "200":
          description: Relink accepted, applied, or disabled as a successful business response.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/BookingRelinkResponse"
                  - $ref: "#/components/schemas/BookingSyncDisabledResponse"
        "401":
          $ref: "#/components/responses/ServiceUnauthorized"
        "403":
          $ref: "#/components/responses/ServiceForbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /accounts/{accountId}/manager/counters:
    get:
      tags:
        - Counters
      operationId: getManagerCounters
      summary: Get dashboard counters for the current manager/operator.
      description: |
        Counters are computed by the backend and filtered by permission. Stage 2
        exposes only reliable conversation counters: `unread`, `assigned`, and
        `unassigned`.
      x-account-isolation: required
      x-permission: counters:read
      parameters:
        - $ref: "#/components/parameters/AccountId"
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: timeZone
          in: query
          schema:
            type: string
            examples:
              - Asia/Dubai
      responses:
        "200":
          description: Manager counters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagerCountersResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

webhooks:
  bookingUpserted:
    post:
      tags:
        - Bookings
      operationId: receiveBookingUpsertedWebhook
      summary: Receive an idempotent booking created, updated, or cancelled event.
      description: |
        Booking providers call this endpoint when booking state changes. The
        integration layer must deduplicate by `Idempotency-Key` and by
        `sourceEventId` within `(accountId, sourceSystem)`.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/WebhookSignature"
        - $ref: "#/components/parameters/WebhookTimestamp"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingWebhookEnvelope"
      responses:
        "202":
          description: Event accepted, including duplicate accepted deliveries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/InvalidWebhookSignature"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

components:
  securitySchemes:
    chatwootBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Chatwoot user access token
      description: |
        Temporary Stage 3 compatibility auth. Expo obtains this internally from
        `POST /session` and sends `Authorization: Bearer <Chatwoot user access token>`.
    chatwootApiAccessToken:
      type: apiKey
      in: header
      name: api_access_token
      description: Temporary compatibility header for Chatwoot user access tokens.
    chatwootSessionCookie:
      type: apiKey
      in: cookie
      name: _chatwoot_session
      description: Temporary same-origin web auth using the existing Chatwoot Rails session cookie.
    bookingServiceToken:
      type: apiKey
      in: header
      name: X-Fleexa-Booking-Token
      description: |
        Server-to-server Booking inbound token. Chat stores only a SHA-256
        digest in an account-scoped service credential row. The raw token is
        provisioned through backend secret handling and must never be stored in
        Chat or exposed to frontend clients.

  parameters:
    AccountId:
      name: accountId
      in: path
      required: true
      description: Fleexa account identifier. The server must verify membership.
      schema:
        type: string
        pattern: "^acc_[A-Za-z0-9]+$"
    ActiveAccountIdQuery:
      name: activeAccountId
      in: query
      required: false
      schema:
        type: string
        pattern: "^acc_[A-Za-z0-9]+$"
    ConversationId:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
        pattern: "^conv_[A-Za-z0-9]+$"
    DealId:
      name: dealId
      in: path
      required: true
      schema:
        type: string
        pattern: "^deal_[A-Za-z0-9]+$"
    StageId:
      name: stageId
      in: path
      required: true
      schema:
        type: string
        pattern: "^stage_[A-Za-z0-9]+$"
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque pagination cursor returned by the previous page.
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 30
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 120
    OptionalIdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 16
        maxLength: 120
    WebhookSignature:
      name: X-Fleexa-Booking-Signature
      in: header
      required: true
      description: HMAC-SHA256 signature over timestamp, idempotency key, and raw body.
      schema:
        type: string
    WebhookTimestamp:
      name: X-Fleexa-Booking-Timestamp
      in: header
      required: true
      schema:
        type: string
        format: date-time

  responses:
    BadRequest:
      description: Invalid request shape or query parameters.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing, expired, or invalid authentication token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InvalidCredentials:
      description: Email/password credentials were rejected by the temporary Chatwoot auth adapter.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated user lacks the required account permission.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found in this account or not visible to the user.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Version conflict, duplicate mutation, or idempotency key reuse with different payload.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnprocessableEntity:
      description: Domain validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Request rate limit exceeded.
      headers:
        Retry-After:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InvalidWebhookSignature:
      description: Webhook signature verification failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnauthorized:
      description: Missing or invalid Booking service token. Non-retryable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ServiceAuthErrorResponse"
          examples:
            missing:
              value:
                error:
                  code: service_auth_missing
                  message: Booking service token is required.
                  details:
                    retryable: false
            invalid:
              value:
                error:
                  code: service_auth_invalid
                  message: Booking service token is invalid.
                  details:
                    retryable: false
    ServiceForbidden:
      description: Booking service token is valid but scoped to another account or missing scope. Non-retryable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ServiceAuthErrorResponse"
          examples:
            accountMismatch:
              value:
                error:
                  code: service_auth_account_mismatch
                  message: Booking service token is not scoped to this account.
                  details:
                    retryable: false
            missingScope:
              value:
                error:
                  code: service_auth_scope_missing
                  message: Booking service token is missing booking:sync.
                  details:
                    retryable: false

  schemas:
    LoginSessionRequest:
      type: object
      required:
        - email
        - password
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
          writeOnly: true
        accountHint:
          type:
            - string
            - "null"
          description: Optional account id such as `acc_1` or exact workspace name when the user belongs to multiple accounts.

    LoginSessionResponse:
      type: object
      required:
        - accessToken
        - tokenType
        - session
      properties:
        accessToken:
          type: string
          readOnly: true
          description: Temporary Chatwoot user access token. Expo stores this internally and never displays it.
        tokenType:
          type: string
          enum:
            - Bearer
        session:
          $ref: "#/components/schemas/CurrentSessionResponse"

    CurrentSessionResponse:
      type: object
      required:
        - user
        - memberships
        - permissions
        - realtime
        - serverTime
        - apiVersion
      properties:
        user:
          $ref: "#/components/schemas/ManagerUser"
        activeAccountId:
          type:
            - string
            - "null"
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/AccountMembership"
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"
        realtime:
          $ref: "#/components/schemas/RealtimeBootstrap"
        serverTime:
          type: string
          format: date-time
        apiVersion:
          type: string

    AccountMembership:
      type: object
      required:
        - accountId
        - accountName
        - role
        - permissions
      properties:
        accountId:
          type: string
        accountName:
          type: string
        role:
          type: string
          enum:
            - operator
            - manager
            - marketing_admin
            - owner
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"
        features:
          type: array
          items:
            type: string

    ManagerUser:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        avatarUrl:
          type:
            - string
            - "null"
          format: uri
        locale:
          type: string
          examples:
            - en
            - ru
        timeZone:
          type: string
          examples:
            - Asia/Dubai

    Permission:
      type: string
      enum:
        - session:read
        - conversations:read
        - messages:send
        - deals:read
        - deals:update
        - deals:update_stage
        - pipeline:read
        - bookings:read
        - counters:read
        - settings:read
        - settings:write

    RealtimeBootstrap:
      type: object
      required:
        - url
        - token
        - tokenExpiresAt
      properties:
        url:
          type: string
          format: uri
        token:
          type: string
          description: Short-lived token scoped to visible account events.
        tokenExpiresAt:
          type: string
          format: date-time
        lastEventCursor:
          type:
            - string
            - "null"

    ConversationListResponse:
      type: object
      required:
        - data
        - page
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ConversationListItem"
        page:
          $ref: "#/components/schemas/CursorPage"

    ConversationDetailResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/ConversationDetail"

    ConversationListItem:
      type: object
      required:
        - id
        - accountId
        - title
        - status
        - channel
        - contact
        - lastActivityAt
        - unreadCount
        - assignedManager
        - lastCustomerMessageAt
        - lastAgentReplyAt
        - replyState
        - permissions
      properties:
        id:
          type: string
        accountId:
          type: string
        title:
          type: string
        status:
          $ref: "#/components/schemas/ConversationStatus"
        priority:
          type: string
          enum:
            - low
            - normal
            - high
            - urgent
          default: normal
        channel:
          $ref: "#/components/schemas/ChannelSummary"
        contact:
          $ref: "#/components/schemas/ContactSummary"
        assignee:
          oneOf:
            - $ref: "#/components/schemas/Actor"
            - type: "null"
        assignedManager:
          oneOf:
            - $ref: "#/components/schemas/Actor"
            - type: "null"
        lastMessage:
          oneOf:
            - $ref: "#/components/schemas/MessagePreview"
            - type: "null"
        linkedDeal:
          oneOf:
            - $ref: "#/components/schemas/DealSummary"
            - type: "null"
        unreadCount:
          type: integer
          minimum: 0
        lastCustomerMessageAt:
          type:
            - string
            - "null"
          format: date-time
          description: Latest customer-visible incoming message timestamp for backend reply-state logic.
        lastAgentReplyAt:
          type:
            - string
            - "null"
          format: date-time
          description: Latest customer-visible outgoing manager reply timestamp for backend reply-state logic.
        replyState:
          $ref: "#/components/schemas/ReplyState"
        canReply:
          type: boolean
        replyWindow:
          oneOf:
            - $ref: "#/components/schemas/ReplyWindow"
            - type: "null"
        lastActivityAt:
          type: string
          format: date-time
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"

    ConversationDetail:
      allOf:
        - $ref: "#/components/schemas/ConversationListItem"
        - type: object
          required:
            - participants
            - tags
            - createdAt
            - updatedAt
          properties:
            participants:
              type: array
              items:
                $ref: "#/components/schemas/Actor"
            tags:
              type: array
              items:
                type: string
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    ConversationStatus:
      type: string
      enum:
        - open
        - pending
        - resolved
        - snoozed

    ConversationFilter:
      type: string
      enum:
        - mine
        - unassigned
        - unread
        - all
        - waiting_for_reply

    ReplyState:
      type: string
      description: |
        Backend-owned reply state. A new customer message after a manager reply
        moves the conversation back to `waiting_for_reply`; no separate
        `customer_replied_again` state is exposed.
      enum:
        - waiting_for_reply
        - replied

    ChannelSummary:
      type: object
      required:
        - type
        - displayName
      properties:
        type:
          type: string
          enum:
            - whatsapp
            - instagram
            - web_widget
            - email
            - phone
            - telegram
            - other
        displayName:
          type: string

    ContactSummary:
      type: object
      required:
        - id
        - displayName
      properties:
        id:
          type: string
        displayName:
          type: string
        phone:
          type:
            - string
            - "null"
        email:
          type:
            - string
            - "null"
          format: email

    Actor:
      type: object
      required:
        - id
        - displayName
        - type
      properties:
        id:
          type: string
        displayName:
          type: string
        type:
          type: string
          enum:
            - user
            - contact
            - system
            - bot
        avatarUrl:
          type:
            - string
            - "null"
          format: uri

    MessageListResponse:
      type: object
      required:
        - data
        - page
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ManagerMessage"
        page:
          $ref: "#/components/schemas/CursorPage"

    ManagerMessage:
      type: object
      required:
        - id
        - conversationId
        - direction
        - visibility
        - type
        - createdAt
      properties:
        id:
          type: string
        conversationId:
          type: string
        clientMessageId:
          type:
            - string
            - "null"
        direction:
          type: string
          enum:
            - incoming
            - outgoing
        visibility:
          type: string
          enum:
            - customer
            - private_note
            - system
        type:
          type: string
          enum:
            - text
            - attachment
            - template
            - system
        text:
          type:
            - string
            - "null"
        sender:
          oneOf:
            - $ref: "#/components/schemas/Actor"
            - type: "null"
        deliveryStatus:
          type: string
          enum:
            - queued
            - sending
            - sent
            - delivered
            - read
            - failed
          default: sent
        failureReason:
          type:
            - string
            - "null"
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/MessageAttachment"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type:
            - string
            - "null"
          format: date-time

    MessagePreview:
      type: object
      required:
        - id
        - text
        - direction
        - createdAt
      properties:
        id:
          type: string
        text:
          type: string
        direction:
          type: string
          enum:
            - incoming
            - outgoing
        createdAt:
          type: string
          format: date-time

    MessageAttachment:
      type: object
      required:
        - id
        - kind
        - url
      properties:
        id:
          type: string
        kind:
          type: string
          enum:
            - image
            - video
            - audio
            - document
            - other
        fileName:
          type:
            - string
            - "null"
        url:
          type: string
          format: uri
        contentType:
          type:
            - string
            - "null"

    SendTextMessageRequest:
      type: object
      required:
        - clientMessageId
        - text
      properties:
        clientMessageId:
          type: string
          format: uuid
        text:
          type: string
          minLength: 1
          maxLength: 4000
        quotedMessageId:
          type:
            - string
            - "null"

    MessageSendResponse:
      type: object
      required:
        - data
        - idempotency
      properties:
        data:
          $ref: "#/components/schemas/ManagerMessage"
        idempotency:
          $ref: "#/components/schemas/MessageSendIdempotency"

    MessageSendIdempotency:
      type: object
      required:
        - key
        - duplicate
      properties:
        key:
          type: string
          minLength: 16
          maxLength: 120
        duplicate:
          type: boolean
          description: True when this response reused a previously created message.
        originalMessageId:
          type:
            - string
            - "null"
          description: Original Manager message id when `duplicate` is true.

    ReplyWindow:
      type: object
      required:
        - canReply
        - reason
      properties:
        canReply:
          type: boolean
        reason:
          type: string
          enum:
            - open
            - expired
            - missing_channel_permission
            - unsupported_channel
        closesAt:
          type:
            - string
            - "null"
          format: date-time

    LinkedDealResponse:
      type: object
      required:
        - conversationId
        - linkState
        - deal
      properties:
        conversationId:
          type: string
        linkState:
          type: string
          enum:
            - linked
            - missing
            - inaccessible
        deal:
          oneOf:
            - $ref: "#/components/schemas/DealSummary"
            - type: "null"

    DealSummary:
      type: object
      required:
        - id
        - accountId
        - title
        - clientName
        - amount
        - currency
        - stage
        - stageId
        - stageKey
        - stageLabel
        - qualificationStatus
        - source
        - trafficSource
        - leadOrigin
        - lostReason
        - assignedManager
        - lastMessageAt
        - createdAt
        - updatedAt
        - permissions
      properties:
        id:
          type: string
        accountId:
          type: string
        conversationId:
          description: Stable Manager conversation id when the deal is linked to a conversation.
          oneOf:
            - type: string
              pattern: "^conv_[A-Za-z0-9]+$"
            - type: "null"
        title:
          type: string
        clientName:
          type:
            - string
            - "null"
        stage:
          $ref: "#/components/schemas/PipelineStageRef"
        stageId:
          type: string
          pattern: "^stage_[A-Za-z0-9]+$"
        stageKey:
          type: string
        stageLabel:
          type: string
        amount:
          oneOf:
            - $ref: "#/components/schemas/Money"
            - type: "null"
        currency:
          type: string
          minLength: 3
          maxLength: 3
          examples:
            - AED
        qualificationStatus:
          $ref: "#/components/schemas/QualificationStatus"
        source:
          description: Alias for the primary traffic source used by compact pipeline list DTOs.
          oneOf:
            - $ref: "#/components/schemas/AttributionRef"
            - type: "null"
        trafficSource:
          oneOf:
            - $ref: "#/components/schemas/AttributionRef"
            - type: "null"
        leadOrigin:
          oneOf:
            - $ref: "#/components/schemas/AttributionRef"
            - type: "null"
        lostReason:
          oneOf:
            - $ref: "#/components/schemas/AttributionRef"
            - type: "null"
        assignedManager:
          oneOf:
            - $ref: "#/components/schemas/Actor"
            - type: "null"
        bookingRef:
          oneOf:
            - $ref: "#/components/schemas/BookingRef"
            - type: "null"
        contact:
          oneOf:
            - $ref: "#/components/schemas/ContactSummary"
            - type: "null"
        assignee:
          oneOf:
            - $ref: "#/components/schemas/Actor"
            - type: "null"
        sourceAttribution:
          oneOf:
            - $ref: "#/components/schemas/SourceAttribution"
            - type: "null"
        qualification:
          oneOf:
            - $ref: "#/components/schemas/LeadQualification"
            - type: "null"
        lastActivityAt:
          type:
            - string
            - "null"
          format: date-time
        lastMessageAt:
          type:
            - string
            - "null"
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"

    AttributionRef:
      type: object
      required:
        - key
        - label
      properties:
        key:
          type: string
        label:
          type: string

    QualificationStatus:
      type: string
      enum:
        - pending
        - qualified
        - unqualified

    DealDraft:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          maxLength: 255
        clientName:
          type: string
          maxLength: 255
          description: Optional title alias used by mobile clients.
        amount:
          oneOf:
            - $ref: "#/components/schemas/Money"
            - type: "null"
        currency:
          type: string
          enum:
            - AED
          description: Stage 3 supports AED only; multi-currency belongs in backend domain work.
        stageId:
          type: string
          pattern: "^stage_[A-Za-z0-9]+$"
        stageKey:
          type: string
        qualificationStatus:
          $ref: "#/components/schemas/QualificationStatus"
        trafficSource:
          $ref: "#/components/schemas/AttributionRef"
        trafficSourceKey:
          type: string
          description: Must match active Attribution Settings values when they exist.
        leadOrigin:
          $ref: "#/components/schemas/AttributionRef"
        leadOriginKey:
          type: string
          description: Must match active Attribution Settings values when they exist.
        lostReason:
          $ref: "#/components/schemas/AttributionRef"
        lostReasonKey:
          type: string
        lostReasonLabel:
          type: string
        assignedManagerId:
          type:
            - string
            - "null"
          pattern: "^user_[A-Za-z0-9]+$"

    CreateConversationDealRequest:
      type: object
      additionalProperties: false
      properties:
        deal:
          $ref: "#/components/schemas/DealDraft"

    UpdateDealRequest:
      type: object
      additionalProperties: false
      required:
        - deal
      properties:
        deal:
          $ref: "#/components/schemas/DealDraft"

    DealMutationResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/DealSummary"

    PipelineStageRef:
      type: object
      required:
        - id
        - key
        - name
      properties:
        id:
          type: string
        key:
          type: string
        name:
          type: string

    DealStageUpdateRequest:
      type: object
      required:
        - stageId
        - clientMutationId
      properties:
        stageId:
          type: string
        clientMutationId:
          type: string
          format: uuid
        expectedVersion:
          type:
            - integer
            - "null"
        note:
          type:
            - string
            - "null"
          maxLength: 1000
        lostReason:
          $ref: "#/components/schemas/AttributionRef"
        lostReasonKey:
          type: string
        lostReasonLabel:
          type: string
          description: Required when moving into lost/cancelled stages if account loss-reason rules are configured.

    DealStageUpdateResponse:
      type: object
      required:
        - data
        - transition
      properties:
        data:
          $ref: "#/components/schemas/DealSummary"
        transition:
          $ref: "#/components/schemas/DealStageTransition"
        emittedEventId:
          type:
            - string
            - "null"

    DealStageTransition:
      type: object
      required:
        - fromStage
        - toStage
        - changedAt
        - changedBy
      properties:
        fromStage:
          oneOf:
            - $ref: "#/components/schemas/PipelineStageRef"
            - type: "null"
        toStage:
          $ref: "#/components/schemas/PipelineStageRef"
        changedAt:
          type: string
          format: date-time
        changedBy:
          $ref: "#/components/schemas/Actor"

    PipelineStagesResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PipelineStage"

    PipelineStage:
      type: object
      required:
        - id
        - key
        - name
        - color
        - position
        - kind
        - isTerminal
      properties:
        id:
          type: string
        key:
          type: string
        name:
          type: string
        color:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
        position:
          type: integer
        kind:
          type: string
          enum:
            - intake
            - active
            - successful
            - lost
        isTerminal:
          type: boolean
        counters:
          oneOf:
            - $ref: "#/components/schemas/StageCounters"
            - type: "null"
        requiredFields:
          type: array
          items:
            $ref: "#/components/schemas/RequiredFieldRef"

    StageCounters:
      type: object
      required:
        - dealCount
        - totalAmount
      properties:
        dealCount:
          type: integer
          minimum: 0
        totalAmount:
          $ref: "#/components/schemas/Money"

    RequiredFieldRef:
      type: object
      required:
        - key
        - label
      properties:
        key:
          type: string
        label:
          type: string

    DealsListResponse:
      type: object
      required:
        - data
        - page
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DealSummary"
        page:
          $ref: "#/components/schemas/CursorPage"

    DealsByStageResponse:
      type: object
      required:
        - stage
        - data
        - page
      properties:
        stage:
          $ref: "#/components/schemas/PipelineStageRef"
        data:
          type: array
          items:
            $ref: "#/components/schemas/DealSummary"
        page:
          $ref: "#/components/schemas/CursorPage"

    BookingResolveDealRequest:
      type: object
      required:
        - pipeline_deal_ref_input
      additionalProperties: false
      properties:
        pipeline_deal_ref_input:
          type: string
          minLength: 1
          description: Raw manager input such as `#83839`, `83839`, `D-83839`, a deal URL, a conversation URL, or a conversation id. This is never the primary link.

    BookingResolveDealResponse:
      type: object
      required:
        - status
        - retryable
        - accountId
        - fleexaCompanyId
        - candidates
      properties:
        status:
          type: string
          enum:
            - RESOLVED
            - NOT_FOUND
            - AMBIGUOUS_REFERENCE
            - PENDING_USER_ACTION
        retryable:
          type: boolean
          default: false
        accountId:
          type: string
        fleexaCompanyId:
          type:
            - string
            - "null"
        pipeline_deal_id:
          type:
            - string
            - "null"
          description: Real internal `crm_deals.id` as a string. Never the raw manager input.
        deal_display_number:
          type:
            - string
            - "null"
        conversation_id:
          type:
            - string
            - "null"
          description: Chatwoot conversation display id as a string.
        company_id:
          type:
            - string
            - "null"
          description: Fleexa company id mapped from the Chat account service credential.
        client_preview:
          oneOf:
            - $ref: "#/components/schemas/ContactSummary"
            - type: "null"
        preview:
          oneOf:
            - $ref: "#/components/schemas/DealSummary"
            - type: "null"
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/PendingUserActionCandidate"

    BookingSyncRequest:
      allOf:
        - type: object
          required:
            - booking_id
            - booking_number
            - booking_client_id
            - booking_client_name
            - booking_client_phone
            - booking_version
            - source_updated_at
            - vehicle
            - rental_start
            - rental_end
            - rental_days
            - amount
            - currency
            - booking_status
            - source
          additionalProperties: false
          properties:
            booking_id:
              type: string
              minLength: 1
              description: Stable Fleexa Booking Order.id. This cannot be a display booking number.
            booking_number:
              type: string
              minLength: 1
              description: Display-only booking number.
            booking_client_id:
              type: string
              minLength: 1
              description: Stable Fleexa Booking Contact.id. Store on Chat contacts custom_attributes.
            booking_client_name:
              type: string
              minLength: 1
            booking_client_phone:
              type:
                - string
                - "null"
              description: Renter phone if known. Phone is a candidate only and must not merge clients automatically.
            booking_version:
              type: integer
              minimum: 1
              description: Monotonic Booking version. This decides freshness, not `source_updated_at`.
            source_updated_at:
              type: string
              format: date-time
              description: Informational timestamp only; never use as event ordering source.
            idempotency_key:
              type: string
              minLength: 16
              maxLength: 120
            event_id:
              type: string
              minLength: 1
            pipeline_deal_id:
              type:
                - string
                - "null"
              description: Real Chat `crm_deals.id` when Booking already has a confirmed link. If present, sync must update exactly this deal and never create another one.
            pipeline_deal_ref_input:
              type:
                - string
                - "null"
              description: Raw manager input retained for audit/debug only. It is not the link key.
            confirmed_contact_override:
              type: boolean
              default: false
              description: Explicit manager confirmation that allows changing an existing deal contact. Without this flag, sync must not overwrite existing `contact_id` or `client_phone`.
            vehicle:
              $ref: "#/components/schemas/BookingVehicleSnapshot"
            rental_start:
              type: string
              format: date-time
            rental_end:
              type: string
              format: date-time
            rental_days:
              type: integer
              minimum: 0
            amount:
              type: string
              pattern: "^-?[0-9]+(\\.[0-9]{1,2})?$"
            currency:
              type: string
              minLength: 3
              maxLength: 3
              examples:
                - AED
            booking_status:
              type: string
              enum:
                - booking
                - reserved
                - rental
                - done
                - cancel
            source:
              $ref: "#/components/schemas/BookingSyncSource"
            referral:
              $ref: "#/components/schemas/BookingReferralInfo"
        - anyOf:
            - required:
                - idempotency_key
            - required:
                - event_id

    BookingVehicleSnapshot:
      type: object
      required:
        - vehicle_id
        - vehicle_name
        - vehicle_plate
      additionalProperties: false
      properties:
        vehicle_id:
          type: string
          minLength: 1
        vehicle_name:
          type: string
          minLength: 1
        vehicle_plate:
          type:
            - string
            - "null"
        brand_model:
          type:
            - string
            - "null"
        fleet_number:
          type:
            - string
            - "null"
        photo_url:
          type:
            - string
            - "null"
          format: uri
        group:
          type:
            - string
            - "null"

    BookingSyncSource:
      type: object
      required:
        - type
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - Booking
            - Referral
        communication_phone:
          type:
            - string
            - "null"
          description: Phone used for communication, including referral source phone. This must not become the renter's personal phone.

    BookingReferralInfo:
      type: object
      additionalProperties: false
      properties:
        communication_phone:
          type:
            - string
            - "null"
        referred_by_contact_id:
          type:
            - string
            - "null"
          description: Existing Chat contact id for the referral source when found.
        note:
          type:
            - string
            - "null"

    BookingSyncResponse:
      type: object
      required:
        - status
        - retryable
        - accountId
        - bookingId
      properties:
        status:
          type: string
          enum:
            - SYNCED
            - PENDING_USER_ACTION
            - FAILED
        retryable:
          type: boolean
          default: false
        accountId:
          type: string
        fleexaCompanyId:
          type:
            - string
            - "null"
        bookingId:
          type: string
        bookingVersion:
          type: integer
          minimum: 1
        pipelineDealId:
          type:
            - string
            - "null"
        freshnessBasis:
          type: string
          enum:
            - booking_version
        mutated:
          type: boolean
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/PendingUserActionCandidate"
          description: Required when status is `PENDING_USER_ACTION`.

    BookingStaleEventResponse:
      type: object
      required:
        - status
        - retryable
        - accountId
        - bookingId
        - freshnessBasis
      properties:
        status:
          type: string
          enum:
            - STALE_BOOKING_EVENT
        retryable:
          type: boolean
          default: false
        accountId:
          type: string
        fleexaCompanyId:
          type:
            - string
            - "null"
        bookingId:
          type: string
        acceptedBookingVersion:
          type: integer
          minimum: 1
        receivedBookingVersion:
          type: integer
          minimum: 1
        freshnessBasis:
          type: string
          enum:
            - booking_version

    BookingSyncDisabledResponse:
      type: object
      required:
        - status
        - code
        - retryable
        - accountId
        - message
      properties:
        status:
          type: string
          enum:
            - SYNC_DISABLED
        code:
          type: string
          enum:
            - SYNC_DISABLED
        retryable:
          type: boolean
          default: false
        accountId:
          type: string
        fleexaCompanyId:
          type:
            - string
            - "null"
        message:
          type: string

    BookingRelinkRequest:
      type: object
      required:
        - new_pipeline_deal_id
        - reason
      additionalProperties: false
      properties:
        new_pipeline_deal_id:
          type: string
          minLength: 1
          description: Real Chat `crm_deals.id` for the new link. The deal must belong to this account.
        reason:
          type: string
          minLength: 1
          maxLength: 500

    BookingRelinkResponse:
      type: object
      required:
        - status
        - retryable
        - accountId
        - bookingId
        - newPipelineDealId
        - auditRequired
      properties:
        status:
          type: string
          enum:
            - RELINKED
        retryable:
          type: boolean
          default: false
        accountId:
          type: string
        fleexaCompanyId:
          type:
            - string
            - "null"
        bookingId:
          type: string
        oldPipelineDealId:
          type:
            - string
            - "null"
        newPipelineDealId:
          type: string
        auditRequired:
          type: boolean
          description: Structured audit is persisted before returning `RELINKED`.
        audit:
          type: object
          additionalProperties: true
        mutated:
          type: boolean

    PendingUserActionCandidate:
      type: object
      required:
        - pipeline_deal_id
        - title
        - reason
        - active
      properties:
        pipeline_deal_id:
          type: string
        deal_display_number:
          type:
            - string
            - "null"
        title:
          type: string
        stage:
          oneOf:
            - type: object
              additionalProperties: false
              properties:
                id:
                  type: string
                key:
                  type: string
                name:
                  type: string
                fleet_status_trigger:
                  type:
                    - string
                    - "null"
            - type: "null"
        conversation_id:
          type:
            - string
            - "null"
        existing_booking_id:
          type:
            - string
            - "null"
        client_preview:
          oneOf:
            - $ref: "#/components/schemas/ContactSummary"
            - type: "null"
        reason:
          type: string
          enum:
            - multiple_active_deals
            - phone_candidate_only
            - deal_ref_and_conversation_ref_disagree
            - explicit_manager_choice_required
        active:
          type: boolean

    ServiceAuthErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
      description: |
        Booking service auth errors are non-retryable. Supported scopes are
        only `booking:sync` and `booking:relink`; `booking:catalog:read` is not
        valid for this inbound receiver.

    BookingByDealResponse:
      type: object
      required:
        - dealId
        - linkState
        - booking
      properties:
        dealId:
          type: string
        linkState:
          type: string
          enum:
            - linked
            - missing
            - inaccessible
            - conflict
        booking:
          oneOf:
            - $ref: "#/components/schemas/BookingSummary"
            - type: "null"

    BookingRef:
      type: object
      required:
        - bookingId
        - status
      properties:
        bookingId:
          type: string
        status:
          $ref: "#/components/schemas/BookingStatus"
        externalBookingId:
          type:
            - string
            - "null"

    BookingSummary:
      type: object
      required:
        - id
        - accountId
        - status
        - sourceSystem
        - period
        - version
      properties:
        id:
          type: string
        accountId:
          type: string
        dealId:
          type:
            - string
            - "null"
        externalBookingId:
          type:
            - string
            - "null"
        status:
          $ref: "#/components/schemas/BookingStatus"
        customer:
          $ref: "#/components/schemas/ContactSummary"
        vehicle:
          oneOf:
            - $ref: "#/components/schemas/VehicleSummary"
            - type: "null"
        period:
          $ref: "#/components/schemas/BookingPeriod"
        total:
          oneOf:
            - $ref: "#/components/schemas/Money"
            - type: "null"
        sourceSystem:
          type: string
        lastSyncedAt:
          type:
            - string
            - "null"
          format: date-time
        version:
          type: integer
          minimum: 1

    BookingStatus:
      type: string
      enum:
        - draft
        - pending
        - confirmed
        - active
        - completed
        - cancelled
        - no_show

    BookingPeriod:
      type: object
      required:
        - startsAt
        - endsAt
      properties:
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        timeZone:
          type: string

    VehicleSummary:
      type: object
      required:
        - label
      properties:
        id:
          type:
            - string
            - "null"
        label:
          type: string
        plateNumber:
          type:
            - string
            - "null"

    ManagerCountersResponse:
      type: object
      required:
        - accountId
        - generatedAt
        - counters
      properties:
        accountId:
          type: string
        generatedAt:
          type: string
          format: date-time
        counters:
          $ref: "#/components/schemas/ManagerConversationCounters"

    ManagerConversationCounters:
      type: object
      required:
        - unread
        - assigned
        - unassigned
      properties:
        unread:
          type: integer
          minimum: 0
          description: Count of conversations visible to the user with unread messages.
        assigned:
          type: integer
          minimum: 0
          description: Count of visible conversations assigned to a user.
        unassigned:
          type: integer
          minimum: 0
          description: Count of visible conversations with no assignee.
      description: |
        Stage 2 exposes only counters that can be read reliably from existing
        Chatwoot conversation state. Answered/unanswered, reply-risk, deal, and
        booking counters are intentionally omitted until backend logic and tests
        exist.

    SourceAttribution:
      type: object
      required:
        - trafficSourceKey
        - trafficSourceLabel
        - leadOriginKey
        - leadOriginLabel
        - sourceDetectionMethod
        - sourceConfidence
        - needsSourceClarification
      properties:
        trafficSourceKey:
          type:
            - string
            - "null"
        trafficSourceLabel:
          type:
            - string
            - "null"
        leadOriginKey:
          type:
            - string
            - "null"
        leadOriginLabel:
          type:
            - string
            - "null"
        sourceDetectionMethod:
          type: string
          enum:
            - click_id
            - utm
            - first_message_rule
            - manual
            - unknown
        sourceConfidence:
          type: string
          enum:
            - auto
            - manual
            - unknown
        needsSourceClarification:
          type: boolean
          default: false

    LeadQualification:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - pending
            - unqualified
            - qualified
        reason:
          type:
            - string
            - "null"
        lostReasonKey:
          type:
            - string
            - "null"
        lostReasonLabel:
          type:
            - string
            - "null"

    Money:
      type: object
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          pattern: "^-?[0-9]+(\\.[0-9]{1,2})?$"
        currency:
          type: string
          minLength: 3
          maxLength: 3
          examples:
            - AED

    CursorPage:
      type: object
      required:
        - limit
        - hasMore
      properties:
        limit:
          type: integer
        nextCursor:
          type:
            - string
            - "null"
        previousCursor:
          type:
            - string
            - "null"
        hasMore:
          type: boolean

    BookingWebhookEnvelope:
      type: object
      required:
        - accountId
        - sourceSystem
        - sourceEventId
        - eventType
        - occurredAt
        - booking
      properties:
        accountId:
          type: string
        sourceSystem:
          type: string
          examples:
            - fleetly
            - rental_core
        sourceEventId:
          type: string
        eventType:
          type: string
          enum:
            - booking.created
            - booking.updated
            - booking.status_changed
            - booking.cancelled
        occurredAt:
          type: string
          format: date-time
        booking:
          $ref: "#/components/schemas/BookingWebhookPayload"

    BookingWebhookPayload:
      type: object
      required:
        - externalBookingId
        - status
        - period
      properties:
        externalBookingId:
          type: string
        status:
          $ref: "#/components/schemas/BookingStatus"
        dealId:
          type:
            - string
            - "null"
        customer:
          $ref: "#/components/schemas/ContactSummary"
        vehicle:
          oneOf:
            - $ref: "#/components/schemas/VehicleSummary"
            - type: "null"
        period:
          $ref: "#/components/schemas/BookingPeriod"
        total:
          oneOf:
            - $ref: "#/components/schemas/Money"
            - type: "null"
        version:
          type:
            - integer
            - "null"

    WebhookAcceptedResponse:
      type: object
      required:
        - accepted
        - duplicate
        - eventId
      properties:
        accepted:
          type: boolean
        duplicate:
          type: boolean
        eventId:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: Server error code. SDKs may synthesize `network_error` when no HTTP response exists.
              enum:
                - bad_request
                - unauthenticated
                - invalid_credentials
                - service_auth_missing
                - service_auth_invalid
                - service_auth_account_mismatch
                - service_auth_scope_missing
                - forbidden
                - not_found
                - conflict
                - validation_failed
                - rate_limited
                - invalid_webhook_signature
                - unknown_error
            message:
              type: string
            requestId:
              type: string
            details:
              type: object
              additionalProperties: true
