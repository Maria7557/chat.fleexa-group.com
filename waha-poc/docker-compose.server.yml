services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - .env
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$WAHA_REDIS_PASSWORD\""]
    volumes:
      - redis-data:/data

  waha:
    image: devlikeapro/waha
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:3003:3000"
    depends_on:
      - redis
    volumes:
      - ./sessions:/app/.sessions
      - ./media:/app/.media
    networks:
      default:
      server_external:
        aliases:
          - waha

networks:
  server_external:
    external: true

volumes:
  redis-data:

