services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "redis"]
    volumes:
      - redis-data:/data

  waha:
    image: devlikeapro/waha
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - redis
    volumes:
      - ./sessions:/app/.sessions
      - ./media:/app/.media

volumes:
  redis-data:
